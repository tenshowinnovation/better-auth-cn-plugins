name: Publish

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Package version to publish"
                required: true
                type: string

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        name: Publish to npm
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.33.2

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
                  registry-url: "https://registry.npmjs.org"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Verify requested version
              run: |
                  PACKAGE_VERSION=$(node -p "require('./packages/better-auth-cn-plugins/package.json').version")
                  if [ "$PACKAGE_VERSION" != "${{ inputs.version }}" ]; then
                    echo "Input version '${{ inputs.version }}' does not match package version '$PACKAGE_VERSION'."
                    exit 1
                  fi

            - name: Typecheck
              run: pnpm typecheck

            - name: Build
              run: pnpm build

            - name: Pack dry run
              run: pnpm -C packages/better-auth-cn-plugins pack --dry-run

            - name: Pack package
              id: pack
              run: |
                  TARBALL=$(pnpm -C packages/better-auth-cn-plugins pack --pack-destination "$RUNNER_TEMP" | tail -n 1)
                  echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

            - name: Publish
              run: npm publish "${{ steps.pack.outputs.tarball }}" --access public --provenance --registry https://registry.npmjs.org
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
